<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samklang &amp; Ro Healthcare</title>
  <meta name="description" content="Samklang & Ro Healthcare の公式サイトは samklang-ro.com に移転しました。" />
  <meta http-equiv="refresh" content="6; url=https://samklang-ro.com/" />
  <link rel="canonical" href="https://samklang-ro.com/" />
  <style>
    :root{
      --bg:#f7f7f4;
      --panel:#fcfcfa;
      --text:#1f3550;
      --sub:#607080;
      --line:#d7dde3;
      --accent:#7f9188;
      --maxw:760px;
      --radius:18px;
      --shadow:0 14px 40px rgba(31,53,80,0.08);
    }

    *{box-sizing:border-box;}

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic","Noto Sans JP","Segoe UI",sans-serif;
      line-height:1.8;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 20px;
    }

    .wrap{
      width:100%;
      max-width:var(--maxw);
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:56px 40px 44px;
      text-align:center;
    }

    .logo{
      margin:0 auto 28px;
      width:160px;
      max-width:100%;
      display:block;
    }

    h1{
      margin:0 0 14px;
      font-size:clamp(1.6rem, 2.5vw, 2rem);
      font-weight:500;
      letter-spacing:0.02em;
      line-height:1.5;
    }

    .lead{
      margin:0 auto 10px;
      max-width:560px;
      font-size:1.02rem;
      color:var(--sub);
    }

    .sublead{
      margin:0 auto 34px;
      max-width:560px;
      font-size:0.96rem;
      color:var(--sub);
    }

    .actions{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      margin-bottom:28px;
    }

    .button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:260px;
      padding:14px 24px;
      border-radius:999px;
      border:1px solid var(--accent);
      background:var(--accent);
      color:#ffffff;
      text-decoration:none;
      font-size:0.97rem;
      letter-spacing:0.02em;
      transition:transform .18s ease, opacity .18s ease, box-shadow .18s ease;
      box-shadow:0 10px 24px rgba(127,145,136,0.20);
    }

    .button:hover{
      transform:translateY(-1px);
      opacity:0.96;
    }

    .link{
      color:var(--text);
      text-decoration:none;
      border-bottom:1px solid rgba(31,53,80,0.28);
      padding-bottom:1px;
    }

    .link:hover{
      border-bottom-color:rgba(31,53,80,0.55);
    }

    .note{
      margin-top:10px;
      font-size:0.9rem;
      color:var(--sub);
    }

    .footer{
      margin-top:26px;
      padding-top:22px;
      border-top:1px solid var(--line);
      font-size:0.88rem;
      color:var(--sub);
    }

    @media (max-width: 640px){
      .card{
        padding:42px 22px 34px;
      }

      .button{
        width:100%;
        min-width:0;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img src="logo.png" alt="Samklang &amp; Ro Healthcare logo" class="logo" />

      <h1>Official Website</h1>

      <p class="lead">
        Samklang &amp; Ro Healthcare の公式サイトは
        <strong>samklang-ro.com</strong>
        に移転しました。
      </p>

      <p class="sublead">
        こちらの GitHub Pages は案内ページです。<br>
        数秒後に自動で公式サイトへ移動します。
      </p>

      <div class="actions">
        <a class="button" href="https://samklang-ro.com/">Visit Official Website</a>
        <a class="link" href="https://samklang-ro.com/">https://samklang-ro.com/</a>
      </div>

      <p class="note">
        自動で移動しない場合は、上のボタンまたはURLをクリックしてください。
      </p>

      <div class="footer">
        Samklang &amp; Ro Healthcare
      </div>
    </section>
  </main>
</body>
</html>
